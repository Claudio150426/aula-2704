<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Vogal ou Consoante</title>
</head>
<body>

    <h2>Verificador de Vogal ou Consoante</h2>

    Digite uma letra:<br/>
    <input type="text" id="letra" maxlength="1"><br/><br/>

    <button onclick="verificar()">Verificar</button>

    <p id="resultado"></p>

    <script>
        function verificar() {
            let letra = document.getElementById("letra").value.toLowerCase();

            if (letra === "") {
                document.getElementById("resultado").innerHTML = "Digite uma letra.";
                return;
            }

            if (!/[a-z]/.test(letra)) {
                document.getElementById("resultado").innerHTML = "Digite apenas letras.";
                return;
            }

            if ("aeiou".includes(letra)) {
                document.getElementById("resultado").innerHTML = "É uma vogal.";
            } else {
                document.getElementById("resultado").innerHTML = "É uma consoante.";
            }
        }
    </script>

</body>
</html>
