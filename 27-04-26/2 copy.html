<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 2 da Lista</title>
</head>

<body>
    <h1>Exercício 2 da lista</h1>
    <hr>
    <form>
        Nota 1:<br /> <input type="number" id="n1"><br />
        Nota 2:<br /> <input type="number" id="n2"><br /><br />
        <button type="button" onclick="calcular()">Calcular</button>
        <input type="reset" value="Limpar"><br /><br />
        Média:<br />
        <input type="text" id="resposta" readonly><br /><br />
        Situação:<br />
        <input type="text" id="resultado" readonly>
    </form>
    <script>
        function calcular() {
            let x = parseFloat(document.getElementById("n1").value);
            let y = parseFloat(document.getElementById("n2").value);
            if (isNaN(x) || isNaN(y)) {
                alert("Digite valores válidos.");
                return;
            }
            let media = (x + y) / 2;
            document.getElementById("resposta").value = media.toFixed(2);
            if (media >= 7) {
                document.getElementById("resultado").value = "Aprovado";
            } else {
                document.getElementById("resultado").value = "Reprovado";
            }
        }  
    </script>
</body>

</html>
